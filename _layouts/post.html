---
layout: default
---

<header>

    <span class="post-links">
        <span class="post-date">
            <span class="nowrap">{{ page.date | date: "%-d %B %Y" }}</span>
        </span>
        <span class="post-tags">
            {% if page.tags %}
            {% assign sorted = page.tags | sort %}
            {% for tag in sorted %}
            <a class="post-tag" href="/#{{ tag }}">#{{ tag }}</a>
            {% endfor %}
            {% endif %}
        </span>
    </span>

    <h1 class="post-title">{{ page.title }}</h1>
</header>

<article>
    {{content | replace: '<div class="footnotes" role="doc-endnotes">', '
        <hr>
        <div class="footnotes" role="doc-endnotes">'}}
</article>

<!DOCTYPE html>

<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Icon handling -->
    <link rel="apple-touch-icon-precomposed" href="{{ site.url }}/assets/apple-touch-icon.png" />
    <link rel="shortcut icon" href="{{ site.baseurl }}/assets/favicon.ico" type="image/x-icon" />
    <!-- Make sure Google doesn't double-count index.html -->
    <link href="{{ page.url | replace: 'index.html', '' | prepend: site.baseurl | prepend: site.url }}" rel="canonical">
    <!-- Font Awesome glyphs -->
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.4.1/css/all.css"
        integrity="sha384-5sAR7xN1Nv6T6+dT2mhtzEpVJvfS3NScPQTrOxhwjIuvcA67KV2R5Jz6kr4abQsz" crossorigin="anonymous">
    <!-- Google fonts. Might come back to the logo font especially -->
    <link href="//fonts.googleapis.com/css?family=Roboto:400,700|Alata|Outfit" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Shrikhand|Calistoga|Orelega+One|Suez+One&display=swap"
        rel="stylesheet">
    <!-- Import CSS -->
    <link href="{{ '/assets/app.css' | prepend: site.baseurl }}" rel="stylesheet">
    <!-- Jekyll SEO for Facebook and Twitter sharing. Also handles title, etc. -->
    {% seo %}
    <!--[if lte IE 8]>
        <script src="//oss.maxcdn.com/libs/html5shiv/3.7.0/html5shiv.js"></script>
        <script src="//oss.maxcdn.com/libs/respond.js/1.4.2/respond.min.js"></script>
    <![endif]-->
</head>

<body>

    <div class="autocard-wrap" id="autocard-wrap" onclick="hideAutocard()">
        <img class="autocard" id="autocard">
    </div>

    <div class="navbar">

        <div class="navbar-top">
            <div class="navbar-thumb">
                <img src="/assets/images/thumb/charles-hair.png">
                <div class="navbar-title">{{ site.title }}</div>
            </div>
        </div>

        <div class="navbar-bot">
            <div class="navbar-link"><a href="{{ site.url }}">Home</a></div>
            <div class="navbar-link"><a href="/about">About</a></div>
            <div class="navbar-link"><a href="/files/resume/charles-fyfe.pdf">Résumé</a></div>
            <div class="copy">&copy; 2026 All rights reserved</div>
        </div>

    </div>
    <div class="main">
        {{ content }}
    </div>

    <!-- Import Javascript -->
    <script src="{{ '/assets/app.js' | prepend: site.baseurl }}"></script>

    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Google analytics -->
    <script>
        (function (i, s, o, g, r, a, m) {
            i['GoogleAnalyticsObject'] = r; i[r] = i[r] || function () {
                (i[r].q = i[r].q || []).push(arguments)
            }, i[r].l = 1 * new Date(); a = s.createElement(o),
                m = s.getElementsByTagName(o)[0]; a.async = 1; a.src = g; m.parentNode.insertBefore(a, m)
        })(window, document, 'script', 'https://www.google-analytics.com/analytics.js', 'ga');
        ga('create', 'UA-89174580-1', 'auto');
        ga('send', 'pageview');
    </script>

</body>

</html>
